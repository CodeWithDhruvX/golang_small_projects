apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ecommerce
data:
  KAFKA_BROKERS: "kafka:9092"
  USER_DB_URL: "postgres://postgres:password@postgres:5432/userdb?sslmode=disable"
  ORDER_DB_URL: "postgres://postgres:password@postgres:5432/orderdb?sslmode=disable"
  MONGO_URI: "mongodb://mongo:27017"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ecommerce
type: Opaque
stringData:
  postgres-password: "password"
