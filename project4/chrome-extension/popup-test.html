<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Response Generator - Test</title>
    <style>
        body {
            width: 380px;
            min-height: 400px;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: white;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            margin: -20px -20px 20px -20px;
            text-align: center;
        }
        
        .status {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
        }
        
        .btn:hover {
            background: #1557b0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Email Assistant</h1>
        <div id="status-text">Loading...</div>
    </div>
    
    <div class="status">
        <h3>Connection Status</h3>
        <p>Gmail: <span id="gmail-status">Not connected</span></p>
        <p>Backend: <span id="backend-status">Checking...</span></p>
        <button id="connect-btn" class="btn">Connect Gmail</button>
    </div>
    
    <div id="settings" class="status hidden">
        <h3>Settings</h3>
        <label>
            Tone:
            <select id="tone">
                <option value="professional">Professional</option>
                <option value="casual">Casual</option>
                <option value="friendly">Friendly</option>
                <option value="formal">Formal</option>
            </select>
        </label>
        <br><br>
        <label>
            Length:
            <select id="length">
                <option value="short">Short</option>
                <option value="medium">Medium</option>
                <option value="detailed">Detailed</option>
            </select>
        </label>
        <br><br>
        <button id="save-btn" class="btn">Save Settings</button>
    </div>
    
    <div id="actions" class="status hidden">
        <h3>Actions</h3>
        <button id="sync-btn" class="btn">Sync Emails</button>
        <button id="gmail-btn" class="btn">Open Gmail</button>
    </div>
    
    <script>
        console.log('Test popup loaded');
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            
            const statusText = document.getElementById('status-text');
            const gmailStatus = document.getElementById('gmail-status');
            const backendStatus = document.getElementById('backend-status');
            const connectBtn = document.getElementById('connect-btn');
            const settings = document.getElementById('settings');
            const actions = document.getElementById('actions');
            
            statusText.textContent = 'Extension loaded';
            gmailStatus.textContent = 'Not connected';
            backendStatus.textContent = 'Online';
            
            connectBtn.addEventListener('click', function() {
                statusText.textContent = 'Connecting...';
                chrome.tabs.create({ url: 'http://localhost:8080/api/v1/auth/gmail' });
            });
            
            document.getElementById('save-btn').addEventListener('click', function() {
                alert('Settings saved (test)');
            });
            
            document.getElementById('sync-btn').addEventListener('click', function() {
                alert('Sync started (test)');
            });
            
            document.getElementById('gmail-btn').addEventListener('click', function() {
                chrome.tabs.create({ url: 'https://mail.google.com' });
            });
            
            // Test Chrome APIs
            if (typeof chrome !== 'undefined') {
                console.log('Chrome APIs available');
                statusText.textContent = 'Chrome APIs ready';
            } else {
                console.error('Chrome APIs not available');
                statusText.textContent = 'Chrome APIs not available';
            }
        });
    </script>
</body>
</html>
