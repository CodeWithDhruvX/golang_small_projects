global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Go Backend Application
  - job_name: 'ai-recruiter-backend'
    static_configs:
      - targets: ['host.docker.internal:8080']  # Backend will run on host
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Redis Exporter (if added later)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # Ollama metrics (if available)
  # - job_name: 'ollama'
  #   static_configs:
  #     - targets: ['ollama:11434']
  #   metrics_path: '/metrics'
