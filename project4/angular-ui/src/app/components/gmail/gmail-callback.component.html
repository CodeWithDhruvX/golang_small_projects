<div class="callback-container min-h-screen flex items-center justify-center bg-gray-50">
  <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="text-center">
      <div class="mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full">
          <svg class="w-8 h-8 text-blue-600 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </div>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Connecting to Gmail</h2>
      <p class="text-gray-600">Please wait while we complete the authentication...</p>
    </div>

    <!-- Success State -->
    <div *ngIf="!isLoading && isSuccess" class="text-center">
      <div class="mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Successfully Connected!</h2>
      <p class="text-gray-600 mb-4">{{ successMessage || 'Your Gmail account has been connected successfully.' }}</p>
      <p class="text-sm text-gray-500">Redirecting you to the dashboard...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="!isLoading && !isSuccess" class="text-center">
      <div class="mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full">
          <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </div>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Connection Failed</h2>
      <p class="text-gray-600 mb-6">{{ errorMessage }}</p>
      <button 
        (click)="retryConnection()"
        class="w-full bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600 transition-colors"
      >
        Try Again
      </button>
    </div>
  </div>
</div>
