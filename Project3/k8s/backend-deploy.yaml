---
apiVersion: v1
kind: Namespace
metadata:
  name: knowledge-base
  labels:
    name: knowledge-base

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: knowledge-base
data:
  PORT: "8080"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/knowledge_base?sslmode=disable"
  OLLAMA_URL: "http://ollama:11434"
  EMBEDDING_MODEL: "nomic-embed-text"
  REDIS_URL: "redis://redis:6379"
  METRICS_ENABLED: "true"

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: knowledge-base
type: Opaque
data:
  JWT_SECRET: c3VwZXItc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1wcm9kdWN0aW9u  # base64 encoded 'super-secure-jwt-secret-key-for-production'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: knowledge-base
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: backend
        image: knowledge-base-go-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: PORT
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_URL
        - name: OLLAMA_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: OLLAMA_URL
        - name: EMBEDDING_MODEL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: EMBEDDING_MODEL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: REDIS_URL
        - name: METRICS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: METRICS_ENABLED
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: knowledge-base
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: backend-headless
  namespace: knowledge-base
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  clusterIP: None

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: knowledge-base
  labels:
    app: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
